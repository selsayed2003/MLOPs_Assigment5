name: GAN Validation and Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This allows you to click a "Run workflow" button in GitHub to test it manually!

jobs:
  validate:
    name: Validation Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install torch torchvision dvc mlflow
          
      - name: Pull Data via DVC
        run: dvc pull

      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python train.py

      - name: Persist Run ID Artifact
        uses: actions/upload-artifact@v4
        with:
          name: run-id-artifact
          path: model_info.txt
          retention-days: 1

  deploy:
    name: Deployment Job
    needs: validate # This ensures deployment ONLY happens if validation succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for DagsHub to Sync
        run: sleep 15
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MLflow
        run: pip install mlflow

      - name: Download Run ID Artifact
        uses: actions/download-artifact@v4
        with:
          name: run-id-artifact

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python check_threshold.py

      - name: Containerize (Mock Docker Build)
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID=$RUN_ID -t my-gan-model:latest .
