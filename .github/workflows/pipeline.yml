# Assigment 6

name: CI/CD Resource Governance

on: [push, pull_request]

jobs:
  # Task 1: The Lightweight Gatekeeper
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Linter
        run: echo "Running lightweight linting checks..."

  # Task 1 & 2: The Conditional Train Job
  train:
    runs-on: ubuntu-latest # In a real scenario, this would be a GPU runner
    needs: linter
    # Conditions: Linter passed AND branch is main AND commit contains [run-train]
    if: |
      github.ref == 'refs/heads/main' && 
      contains(github.event.head_commit.message, '[run-train]')
    steps:
      - uses: actions/checkout@v4
      
      - name: Training Model
        run: |
          echo "Starting expensive GPU training..."
          # Simulating a potential failure for Task 2 demonstration
          # exit 1 
      
      # Task 2: Error Handling & Artifact Upload
      - name: Capture Error Logs
        if: failure()
        run: echo "Search for GPU memory errors or syntax issues here" > error_logs.txt

      - name: Upload Error Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-errors
          path: error_logs.txt

  # Task 3: Final Cleanup
  cleanup:
    runs-on: ubuntu-latest
    needs: [linter, train]
    if: always()
    steps:
      - name: Post-run Cleanup
        run: echo "Cleaning up temporary cloud volumes..."
